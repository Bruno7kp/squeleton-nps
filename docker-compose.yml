services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: nps_app
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_DEBUG: ${APP_DEBUG:-true}
      DB_PATH: ${DB_PATH:-database/app.sqlite}
    networks:
      - nps_net

  web:
    image: nginx:1.27-alpine
    container_name: nps_web
    depends_on:
      - app
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - nps_net

networks:
  nps_net:
    driver: bridge
